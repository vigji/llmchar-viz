# Model panel. Verified live on OpenRouter 2026-05-16; `llmchar validate`
# re-resolves every id against /api/v1/models at runtime (live registry is
# authoritative). family + scale_tier make within-family scale a controlled
# factor. reasoning: provider-advertised; the fidelity probe decides per model
# what is actually effective. reasoning_budget tokens are used only by the
# budget projector (effort is the knob actually sent).

defaults:
  max_temperature: 2.0
  reasoning_budget: { low: 1500, high: 6000 }

models:
  # --- openai ---
  # gpt-5.5-pro is ~50-100x pricier than the rest ($30/$180 per Mtok). Its PILOT
  # data is already paid for and retained (active:false keeps it out of NEW runs
  # but still attributed + reported). gpt-5.5 is the active openai flagship.
  - { id: openai/gpt-5.5-pro,                family: openai,   scale_tier: flagship, reasoning: true,  active: false }
  - { id: openai/gpt-5.5,                    family: openai,   scale_tier: flagship, reasoning: true }
  - { id: openai/gpt-5.4-mini,              family: openai,   scale_tier: small,    reasoning: true }
  - { id: openai/gpt-5.4-nano,              family: openai,   scale_tier: tiny,     reasoning: true }
  # --- anthropic / claude ---
  - { id: anthropic/claude-opus-4.7,        family: claude,   scale_tier: flagship, reasoning: true }
  - { id: anthropic/claude-sonnet-4.6,      family: claude,   scale_tier: mid,      reasoning: true }
  - { id: anthropic/claude-haiku-4.5,       family: claude,   scale_tier: small,    reasoning: true }
  # --- google / gemini ---
  - { id: google/gemini-3.1-pro-preview,    family: gemini,   scale_tier: flagship, reasoning: true }
  - { id: google/gemini-3-flash-preview,    family: gemini,   scale_tier: mid,      reasoning: true }
  - { id: google/gemini-3.1-flash-lite,     family: gemini,   scale_tier: small,    reasoning: true }
  # --- deepseek ---
  - { id: deepseek/deepseek-v4-pro,         family: deepseek, scale_tier: flagship, reasoning: true }
  - { id: deepseek/deepseek-v4-flash,       family: deepseek, scale_tier: small,    reasoning: true }
  # --- xai / grok (no smaller sibling live; scale-gap family) ---
  - { id: x-ai/grok-4.3,                    family: grok,     scale_tier: flagship, reasoning: true }
  # --- mistral ---
  - { id: mistralai/mistral-medium-3-5,     family: mistral,  scale_tier: flagship, reasoning: true }
  - { id: mistralai/mistral-small-2603,     family: mistral,  scale_tier: small,    reasoning: true }
  - { id: mistralai/ministral-8b-2512,      family: mistral,  scale_tier: tiny,     reasoning: false }
  # --- qwen ---
  - { id: qwen/qwen3.6-max-preview,         family: qwen,     scale_tier: flagship, reasoning: true }
  - { id: qwen/qwen3.6-27b,                 family: qwen,     scale_tier: mid,      reasoning: true }
  - { id: qwen/qwen3.6-flash,               family: qwen,     scale_tier: small,    reasoning: true }
  - { id: qwen/qwen3.5-9b,                  family: qwen,     scale_tier: tiny,     reasoning: true }
  # --- moonshot / kimi (no smaller sibling live; scale-gap family) ---
  - { id: moonshotai/kimi-k2.6,             family: kimi,     scale_tier: flagship, reasoning: true }

# panel selectors used by tiers/matrix.
#   flagship -> exactly the scale_tier==flagship models (one per family, ~8)
#   full     -> every model above (~20)
panels:
  flagship: { select: scale_tier, equals: flagship }
  full: { select: all }
